name: shellcheck
on:
  push:
    paths: ["scripts/**", ".github/workflows/shellcheck.yml"]
  pull_request:
    paths: ["scripts/**"]
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck on daemon
        run: shellcheck scripts/tpu_daemon.sh
