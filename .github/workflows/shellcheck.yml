name: shellcheck
on:
  push:
    paths:
      - "scripts/**"
      - ".shellcheckrc"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    paths:
      - "scripts/**"
      - ".shellcheckrc"
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck on all scripts
        run: shellcheck scripts/*.sh
